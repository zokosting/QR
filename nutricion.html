<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>ELIGE SER FELIZ</title>
  <style>
    .centered-container {
        height: 100%;
        width: 100%;
        position: fixed; /* Ocupa toda la pantalla */
        top: 0;
        left: 0;
        display: flex; /* Habilita Flexbox */
        justify-content: center; /* Centrado horizontal */
        align-items: center; /* Centrado vertical */
        flex-direction: column;
        text-align: center;
    }    
    .error-message {
      color: white;
      background-color: #f25041;
      padding: 15px;
      border-radius: 8px;
      margin: 20px auto;
      width: 80%;
      max-width: 400px;
      text-align: center;
      font-family: sans-serif;
    }
    .audio-hidden {
      display: none;
    }
    /* Estilos para la reproducción robusta (Android/Universal) */
    #audioPlayer {
        display: none; /* Oculta el reproductor en el caso de la lógica robusta */
    }
    #unmuteMessage {
      color: gray;
      font-size: 4.5vw; 
      padding: 20px; 
      max-width: 80%;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  
  <script>
    // Función para detectar el sistema operativo (simplificado)
    function isAndroid() {
      const userAgent = navigator.userAgent || navigator.vendor || window.opera;
      return /android/i.test(userAgent);
    }

    function isIOS() {
      const userAgent = navigator.userAgent || navigator.vendor || window.opera;
      // Comprueba si es iPhone, iPad o iPod
      return /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;
    }

    // FALLBACK: LISTA GLOBAL DE URLS (Modificadas para apuntar a la carpeta /audios/)
    const fallbackAudioUrls = [
        "https://raw.githubusercontent.com/zokosting/QR/main/audios/5%20minutos%20de%20afirmaciones%20para%20recordarte%20lo%20incre%C3%ADble%20que%20eres.mp3",
        "https://raw.githubusercontent.com/zokosting/QR/main/audios/Afirmaciones%20poderosas%20para%20volver%20a%20confiar%20en%20ti.mp3",
        "https://raw.githubusercontent.com/zokosting/QR/main/audios/5 minutos de afirmaciones para recordarte lo increíble que eres.mp3",
        "https://raw.githubusercontent.com/zokosting/QR/main/audios/Afirmaciones para confiar en los cambios.mp3",
        "https://raw.githubusercontent.com/zokosting/QR/main/audios/Afirmaciones poderosas para volver a confiar en ti.mp3",
        "https://raw.githubusercontent.com/zokosting/QR/main/audios/Agradecimientos.mp3",
        "https://raw.githubusercontent.com/zokosting/QR/main/audios/Atrae%20un%20buen%20d%C3%ADa.mp3",
        "https://raw.githubusercontent.com/zokosting/QR/main/audios/Cada%20Paso%20Cuenta.mp3",
        "https://raw.githubusercontent.com/zokosting/QR/main/audios/Carta%20para%20cuando%20no%20puedes%20dejar%20de%20pensar.mp3",
        "https://raw.githubusercontent.com/zokosting/QR/main/audios/Cosas%20a%20recordar%20este%20a%C3%B1o.mp3",
        "https://raw.githubusercontent.com/zokosting/QR/main/audios/Dejar%20ir%20el%20pasado.mp3",
        "https://raw.githubusercontent.com/zokosting/QR/main/audios/El%20poder%20de%20la%20historia%20que%20te%20cuentas.mp3",
        "https://raw.githubusercontent.com/zokosting/QR/main/audios/Encuentra%20el%20balance%20en%20tu%20d%C3%ADa%20a%20d%C3%ADa.mp3",
        "https://raw.githubusercontent.com/zokosting/QR/main/audios/Para%20encontrar%20paz%20hoy.mp3",
        "https://raw.githubusercontent.com/zokosting/QR/main/audios/Permítete Soñar.mp3",
        "https://raw.githubusercontent.com/zokosting/QR/main/audios/Recuerda%20tu%20valor.mp3",
        "https://raw.githubusercontent.com/zokosting/QR/main/audios/Renovar tu energía.mp3",
        "https://raw.githubusercontent.com/zokosting/QR/main/audios/Todo%20Va%20A%20Estar%20Bien.mp3",
        "https://raw.githubusercontent.com/zokosting/QR/main/audios/Si%C3%A9ntete%20orgulloso%20de%20lo%20que%20eres.mp3"
    ];

    // Lugar donde almacenaremos las URLs finales (rellenadas por la llamada a GitHub o por fallback)
    let audioUrls = [];

    // Config: el repo / rama de GitHub a inspeccionar
    const GITHUB_OWNER = 'zokosting';
    const GITHUB_REPO  = 'QR';
    const GITHUB_BRANCH = 'main';

    // Intenta obtener listados de archivos desde la API de GitHub (filtrado por la carpeta "audios")
    function fetchMp3ListFromGithub(timeoutMs = 4000) {
      // Modificado para que busque dentro de la estructura de la carpeta 'audios'
      const apiUrl = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/git/trees/${GITHUB_BRANCH}?recursive=1`;
      return new Promise((resolve) => {
        const timer = setTimeout(() => {
          resolve(null); // timeout -> null para indicar fallo
        }, timeoutMs);

        fetch(apiUrl)
          .then(resp => {
            clearTimeout(timer);
            if (!resp.ok) return resolve(null);
            return resp.json();
          })
          .then(data => {
            if (!data || !data.tree) return resolve(null);
            
            // Filtramos únicamente los archivos .mp3 que estén dentro de la carpeta "audios/"
            const mp3Paths = data.tree
              .filter(item => item.type === 'blob' && /^audios\//i.test(item.path) && /\.mp3$/i.test(item.path))
              .map(item => item.path);
              
            // Base URL raw de Github
            const rawBase = `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${GITHUB_BRANCH}/`;
            const urls = mp3Paths.map(p => rawBase + encodeURI(p));
            resolve(urls);
          })
          .catch(() => {
            clearTimeout(timer);
            resolve(null);
          });
      });
    }

    // Utilities
    function uniqueArray(arr) {
      return Array.from(new Set(arr));
    }

    // Elige un elemento al azar
    function chooseRandom(arr) {
      if (!arr || arr.length === 0) return null;
      return arr[Math.floor(Math.random() * arr.length)];
    }

    // Función auxiliar para extraer un título limpio a partir de la URL del archivo
    function getCleanTitle(url) {
      try {
        const decodedUrl = decodeURIComponent(url);
        const fileName = decodedUrl.substring(decodedUrl.lastIndexOf('/') + 1);
        return fileName.replace(/\.mp3$/i, '');
      } catch(e) {
        return "Audio motivacional";
      }
    }

    // LÓGICA DE REPRODUCCIÓN PARA iOS: creamos el <audio> por DOM
    function runIphoneLogic() {
      const VARIABLE = chooseRandom(audioUrls) || chooseRandom(fallbackAudioUrls);

      if (!VARIABLE) {
        document.body.innerHTML = '<div class="error-message">⚠️ No se encontraron archivos de audio.</div>';
        return;
      }

      const audio = document.createElement('audio');
      audio.autoplay = true;
      audio.src = VARIABLE;
      audio.type = 'audio/mpeg';
      audio.style.display = 'none';
      document.body.appendChild(audio);

      audio.play().catch(err => {
        console.warn('Autoplay iOS falló:', err);
      });
    }
    
    // LÓGICA ROBUSTA PARA ANDROID (crea audio oculto + mensaje de click)
    function runAndroidAudioLogic() {
      const VARIABLE = chooseRandom(audioUrls) || chooseRandom(fallbackAudioUrls);

      if (!VARIABLE) {
        document.body.innerHTML = '<div class="error-message">⚠️ No se encontraron archivos de audio.</div>';
        return;
      }

      const audioPlayer = document.createElement('audio');
      audioPlayer.id = 'audioPlayer';
      audioPlayer.autoplay = true;
      audioPlayer.muted = true; 
      audioPlayer.style.display = 'none';

      const src = document.createElement('source');
      src.id = 'audioSource';
      src.src = VARIABLE;
      src.type = 'audio/mpeg';

      audioPlayer.appendChild(src);
      document.body.appendChild(audioPlayer);

      // Obtenemos el título limpio del archivo seleccionado
      const audioTitle = getCleanTitle(VARIABLE);

      const container = document.createElement('div');
      container.className = 'centered-container';
      const p = document.createElement('p');
      p.id = 'unmuteMessage';
      
      // Modificado: Ahora añade obligatoriamente "🎧 " antes del título dinámico
      p.textContent = "🎧 " + audioTitle; 
      
      container.appendChild(p);
      document.body.appendChild(container);

      audioPlayer.load();
      audioPlayer.play().catch(error => { console.warn("Autoplay falló:", error); });

      document.addEventListener("click", function() {
        if (audioPlayer.muted) {
          audioPlayer.muted = false;
          const msg = document.getElementById("unmuteMessage"); if(msg) msg.style.display = "none";
        }
      }, { once: true });
    }

    // Punto de entrada: obtenemos la lista desde GitHub y luego ejecutamos la lógica correspondiente.
    (function init() {
      fetchMp3ListFromGithub().then(githubUrls => {
        if (Array.isArray(githubUrls) && githubUrls.length > 0) {
          audioUrls = uniqueArray(githubUrls.concat(fallbackAudioUrls));
        } else {
          audioUrls = fallbackAudioUrls.slice();
        }

        if (isIOS()) {
          runIphoneLogic();
        } else if (isAndroid()) {
          runAndroidAudioLogic();
        } else {
          document.write('<div class="error-message">');
          document.write('⚠️ Denegado. El contenido está optimizado para funcionar en dispositivos móviles.');
          document.write('</div>');
        }
      });
    })();
  </script>
  
</body>
</html>
