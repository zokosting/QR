<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Última Canción Favorita</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #111;
            color: #fff;
        }
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #b90000; /* Rojo Last.fm */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #status {
            color: #b90000;
        }
        #error-message {
            color: #b90000;
            max-width: 80%;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="loader" class="loader"></div>
    <div id="status">Tu última obsesión...</div>
    <p id="error-message"></p>

    <script>
        async function redirectToTopTrack() {
            const statusDiv = document.getElementById('status');
            const errorMessage = document.getElementById('error-message');
            const loader = document.getElementById('loader');

            try {
                const _0x4f2a = ["YWxOb3J0ZWRlbWk=", "NWZkOWQ0ZTkyMjk1ZDU3MjQ0NGRhOGIxY2YwMzc2Nzk="];
                const apiUrl = `https://ws.audioscrobbler.com/2.0/?method=user.gettoptracks&user=${atob(_0x4f2a[0])}&api_key=${atob(_0x4f2a[1])}&limit=1&period=7day&format=json`;
                
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error("Error al conectar con Last.fm");

                const data = await response.json();
                
                if (!data.toptracks || !data.toptracks.track || data.toptracks.track.length === 0) {
                    throw new Error("No se encontraron canciones en tu historial reciente.");
                }

                const topTrack = data.toptracks.track[0];
                const trackName = topTrack.name;
                const artistName = topTrack.artist.name;

                statusDiv.innerText = `🎵 Redirigiendo a: <strong> ${trackName} - ${artistName}`</strong>;

                // Buscamos el ID usando un motor alternativo rápido de raspado ligero (yt-search libre de CORS)
                const query = encodeURIComponent(`${artistName} ${trackName} official video`);
                const searchResponse = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://www.youtube.com/results?search_query=${query}`)}`);
                
                if (!searchResponse.ok) throw new Error("Error al buscar el vídeo");
                
                const searchData = await searchResponse.json();
                const html = searchData.contents;
                
                // Extraemos el primer ID de vídeo válido (/watch?v=XXXXX) que encuentra en la página de YouTube
                const match = html.match(/"videoId":"([^"]+)"/);
                
                if (match && match[1]) {
                    const videoId = match[1];
                    
                    // Construimos la URL final convirtiendo dinámicamente el resultado a formato de pantalla completa (/v/)
                    const fullScreenUrl = `https://www.youtube.com/v/${videoId}?autoplay=1&playsinline=1`;
                    
                    setTimeout(() => {
                        window.location.href = fullScreenUrl;
                    }, 800);
                } else {
                    // Si el motor rápido falla, aplicamos tu plan de contingencia con la búsqueda directa estructurada en watch
                    const searchQuery = encodeURIComponent(`site:youtube.com/watch ${artistName} ${trackName} official video`);
                    const luckyUrl = `https://www.google.com/search?q=${searchQuery}&btnI=I&autoplay=1&playsinline=1`;
                    
                    setTimeout(() => {
                        window.location.href = luckyUrl;
                    }, 500);
                }

            } catch (error) {
                loader.style.display = 'none';
                statusDiv.innerText = "❌ Error";
                errorMessage.innerText = error.message;
            }
        }

        redirectToTopTrack();
    </script>
</body>
</html>
