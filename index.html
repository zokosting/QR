<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redireccionando...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #111;
            color: #fff;
        }
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #b90000; /* Rojo Last.fm */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #error-message {
            color: #ff6b6b;
            max-width: 80%;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="loader" class="loader"></div>
    <div id="status">Tu obsesión...</div>
    <p id="error-message"></p>

    <script>
        async function redirectToTopTrack() {
            // 1. Obtener los parámetros de la URL (?user=TU_USER&api_key=TU_KEY)
            const urlParams = new URLSearchParams(window.location.search);
            const user = urlParams.get('user');
            const apiKey = urlParams.get('api_key');

            const statusDiv = document.getElementById('status');
            const errorMessage = document.getElementById('error-message');
            const loader = document.getElementById('loader');

            // Guardilla por si faltan los parámetros
            if (!user || !apiKey) {
                loader.style.display = 'none';
                statusDiv.innerText = "❌ Error";
                errorMessage.innerHTML = "Para que funcione, debes acceder usando el formato correcto en la URL";
                return;
            }

            try {
                // 2. Consultar la API de Last.fm (Top Track del último mes)
                const apiUrl = `https://ws.audioscrobbler.com/2.0/?method=user.gettoptracks&user=${user}&api_key=${apiKey}&limit=1&period=1month&format=json`;
                
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error("Error al conectar con Last.fm");

                const data = await response.json();
                
                // Validar que el usuario tenga canciones registradas
                if (!data.toptracks || !data.toptracks.track || data.toptracks.track.length === 0) {
                    throw new Error("No se encontraron canciones en tu historial reciente.");
                }

                const topTrack = data.toptracks.track[0];
                statusDiv.innerText = `🎵 Redirigiendo a: ${topTrack.name} - ${topTrack.artist.name}`;

                // 3. Redirigir automáticamente a la página de la canción en Last.fm
                setTimeout(() => {
                    window.location.href = topTrack.url;
                }, 1000); // Espera 1 segundo para que puedas ver el título antes de irte

            } catch (error) {
                loader.style.display = 'none';
                statusDiv.innerText = "❌ Error";
                errorMessage.innerText = error.message;
            }
        }

        // Ejecutar la función al cargar la página
        redirectToTopTrack();
    </script>
</body>
</html>
