<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>ELIGE SER FELIZ</title>
</head>
<body>
  
  <script>
    // PLAN B
    const fallbackAudioUrls = [
        "https://zokosting.github.io/QR/audios/5%20minutos%20de%20afirmaciones%20para%20recordarte%20lo%20incre%C3%ADble%20que%20eres.mp3",
        "https://zokosting.github.io/QR/audios/Afirmaciones%20para%20confiar%20en%20los%20cambios.mp3",
        "https://zokosting.github.io/QR/audios/Afirmaciones%20poderosas%20para%20volver%20a%20confiar%20en%20ti.mp3",
        "https://zokosting.github.io/QR/audios/Agradecimientos.mp3",
        "https://zokosting.github.io/QR/audios/Atrae%20un%20buen%20d%C3%ADa.mp3",
        "https://zokosting.github.io/QR/audios/Cada%20Paso%20Cuenta.mp3",
        "https://zokosting.github.io/QR/audios/Carta%20para%20cuando%20no%20puedes%20dejar%20de%20pensar.mp3",
        "https://zokosting.github.io/QR/audios/Cosas%20a%20recordar%20este%20a%C3%B1o.mp3",
        "https://zokosting.github.io/QR/audios/Dejar%20ir%20el%20pasado.mp3",
        "https://zokosting.github.io/QR/audios/El%20poder%20de%20la%20historia%20que%20te%20cuentas.mp3",
        "https://zokosting.github.io/QR/audios/Encuentra%20el%20balance%20en%20tu%20d%C3%ADa%20a%20d%C3%ADa.mp3",
        "https://zokosting.github.io/QR/audios/Para%20encontrar%20paz%20hoy.mp3",
        "https://zokosting.github.io/QR/audios/Perm%C3%ADtete%20So%C3%B1ar.mp3",
        "https://zokosting.github.io/QR/audios/Recuerda%20tu%20valor.mp3",
        "https://zokosting.github.io/QR/audios/Renovar%20tu%20energ%C3%ADa.mp3",
        "https://zokosting.github.io/QR/audios/Si%C3%A9ntete%20orgulloso%20de%20lo%20que%20eres.mp3",
        "https://zokosting.github.io/QR/audios/Todo%20Va%20A%20Estar%20Bien.mp3"
    ];

    let audioUrls = [];

    const GITHUB_OWNER = 'zokosting';
    const GITHUB_REPO  = 'QR';
    const GITHUB_BRANCH = 'main';

    function fetchMp3ListFromGithub(timeoutMs = 4000) {
      const apiUrl = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/git/trees/${GITHUB_BRANCH}?recursive=1`;
      return new Promise((resolve) => {
        const timer = setTimeout(() => {
          resolve(null); 
        }, timeoutMs);

        fetch(apiUrl)
          .then(resp => {
            clearTimeout(timer);
            if (!resp.ok) return resolve(null);
            return resp.json();
          })
          .then(data => {
            if (!data || !data.tree) return resolve(null);
            
            const mp3Paths = data.tree
              .filter(item => item.type === 'blob' && /^audios\//i.test(item.path) && /\.mp3$/i.test(item.path))
              .map(item => item.path);
              
            const rawBase = `https://${GITHUB_OWNER}.github.io/${GITHUB_REPO}/`;
            const urls = mp3Paths.map(p => rawBase + encodeURI(p));
            resolve(urls);
          })
          .catch(() => {
            clearTimeout(timer);
            resolve(null);
          });
      });
    }

    function uniqueArray(arr) {
      return Array.from(new Set(arr));
    }

    function chooseRandom(arr) {
      if (!arr || arr.length === 0) return null;
      return arr[Math.floor(Math.random() * arr.length)];
    }

    (function init() {
      fetchMp3ListFromGithub().then(githubUrls => {
        if (Array.isArray(githubUrls) && githubUrls.length > 0) {
          audioUrls = uniqueArray(githubUrls.concat(fallbackAudioUrls));
        } else {
          audioUrls = fallbackAudioUrls.slice();
        }

        const randomAudio = chooseRandom(audioUrls);

        if (randomAudio) {
          window.location.href = randomAudio;
        } else {
          document.body.innerHTML = '<div class="error-message">⚠️ No se encontraron los archivos de audio.</div>';
        }
      });
    })();
  </script>
  
</body>
</html>
