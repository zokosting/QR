<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Última Canción Favorita</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #111;
            color: #fff;
        }
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #b90000; /* Rojo Last.fm */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #error-message {
            color: #b90000;
            max-width: 80%;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="loader" class="loader"></div>
    <div id="status">Tu última obsesión...</div>
    <p id="error-message"></p>

    <script>        
        const CYK2 = "QUl6YVN5RERnUGplUU42bGhFOXhTYktNaWR2blFQM1FJTG5NMzlz";
        async function redirectToTopTrack() {
            const statusDiv = document.getElementById('status');
            const errorMessage = document.getElementById('error-message');
            const loader = document.getElementById('loader');

            try {
                // 1. Obtener el Top Track de Last.fm
                const _0x4f2a = ["YWxOb3J0ZWRlbWk=", "NWZkOWQ0ZTkyMjk1ZDU3MjQ0NGRhOGIxY2YwMzc2Nzk="];
                const apiUrl = `https://ws.audioscrobbler.com/2.0/?method=user.gettoptracks&user=${atob(_0x4f2a[0])}&api_key=${atob(_0x4f2a[1])}&limit=1&period=7day&format=json`;
                
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error("Error al conectar con Last.fm");

                const data = await response.json();
                
                // Fallback si no hay temas en Last.fm esta semana
                if (!data.toptracks || !data.toptracks.track || data.toptracks.track.length === 0) {
                    window.location.href = "https://open.spotify.com/track/0txzIz1WcoAn6m07xypcD5?si=egh83pzQTKCdDCTfTF5CLw";
                    return;
                }

                const topTrack = data.toptracks.track[0];
                const trackName = topTrack.name;
                const artistName = topTrack.artist.name;
                const KYC2 = atob(CYK2);

                // 2. Consultar YouTube para obtener el ID exacto del vídeo
                const query = `${artistName} "${trackName}"`;
                const ytApiUrl = `https://www.googleapis.com/youtube/v3/search?part=id&q=${encodeURIComponent(query)}&type=video&maxResults=1&key=${KYC2}`;

                const ytResponse = await fetch(ytApiUrl);
                if (!ytResponse.ok) throw new Error("Error al conectar con la API de YouTube");
                
                const ytData = await ytResponse.json();

                // 3. Redirigir si encontramos el vídeo
                if (ytData.items && ytData.items.length > 0) {
                    const videoId = ytData.items[0].id.videoId;
                    statusDiv.innerHTML = `🎵 Redirigiendo a: <strong>${trackName} - ${artistName}</strong>`;                    
                    setTimeout(() => {
                        window.location.href = `https://www.youtube.com/v/${videoId}&autoplay=1`;
                    }, 1000);
                } else {
                    statusDiv.innerHTML = `🎵 Hoy te voy a sorprender con...`;
                    window.location.href = "https://open.spotify.com/track/0txzIz1WcoAn6m07xypcD5?si=egh83pzQTKCdDCTfTF5CLw";
                }

            } catch (error) {
                loader.style.display = 'none';
                statusDiv.innerText = "❌ Error";
                errorMessage.innerText = error.message;
            }
        }

        redirectToTopTrack();
    </script>
</body>
</html>
